<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Dice Roller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="history-panel">
            <h3>📜 Histórico</h3>
            <ul id="historyList"></ul>
            <button onclick="clearHistory()" class="btn-clear">Limpar</button>
        </aside>

        <main class="dice-arena">
            <div class="modifier-box">
                <label for="modifier">Modificador (Bônus):</label>
                <div class="mod-input">
                    <span class="plus">+</span>
                    <input type="number" id="modifier" value="0">
                </div>
            </div>

            <div class="dice-wrapper">
                <div id="diceDisplay" class="dice-shape">
                    <span id="diceValue">20</span>
                </div>
                <div id="totalDisplay" class="total-text">Total: 20</div>
            </div>

            <div class="controls-grid">
                <button onclick="roll(4)">D4</button>
                <button onclick="roll(6)">D6</button>
                <button onclick="roll(8)">D8</button>
                <button onclick="roll(10)">D10</button>
                <button onclick="roll(12)">D12</button>
                <button onclick="roll(20)" class="btn-main">D20</button>
                <button onclick="roll(100)">D100</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
